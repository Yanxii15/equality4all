// Build nav pills
const navInner = document.getElementById("navInner");
sections.forEach(s => {
  const a = document.createElement("a");
  a.href = `#${s.id}`;
  a.className = "nav-pill";
  a.textContent = s.title.replace(/^\d+\.\s/, "");
  navInner.appendChild(a);
});

// Build main content
const main = document.getElementById("main");

sections.forEach(section => {
  const card = document.createElement("div");
  card.className = "section-card";
  card.id = section.id;
  card.style.setProperty("--section-accent", section.accent);
  card.style.setProperty("--section-color", section.color + "dd");
  card.style.setProperty("--section-color2", section.color + "88");

  // Section button
  const btn = document.createElement("button");
  btn.className = "section-btn";
  btn.setAttribute("aria-expanded", "false");
  btn.innerHTML = `
    <div class="section-btn-left">
      <div class="section-dot"></div>
      <span class="section-title">${section.title}</span>
    </div>
    <div class="section-btn-right">
      <span class="section-count">${section.points.length} points</span>
      <span class="section-chevron">▾</span>
    </div>
  `;
  btn.addEventListener("click", () => {
    const isOpen = card.classList.toggle("open");
    btn.setAttribute("aria-expanded", isOpen);
  });
  card.appendChild(btn);

  // Points list
  const list = document.createElement("div");
  list.className = "points-list";

  section.points.forEach((point, idx) => {
    const item = document.createElement("div");
    item.className = "point-item";

    const pBtn = document.createElement("button");
    pBtn.className = "point-btn";
    pBtn.setAttribute("aria-expanded", "false");
    pBtn.innerHTML = `
      <div class="point-left">
        <span class="point-num">${String(idx + 1).padStart(2, "0")}</span>
        <span class="point-heading">${point.heading}</span>
      </div>
      <span class="point-toggle">+</span>
    `;
    pBtn.addEventListener("click", () => {
      const isExpanded = item.classList.toggle("expanded");
      pBtn.setAttribute("aria-expanded", isExpanded);
      pBtn.querySelector(".point-toggle").textContent = isExpanded ? "−" : "+";
    });

    // Build the source line — if a link is provided, make it clickable
    let sourceHTML = point.source;
    if (point.link && point.link.trim() !== "") {
      sourceHTML += ` &middot; <a class="source-link" href="${point.link}" target="_blank" rel="noopener noreferrer">View source →</a>`;
    }

    const body = document.createElement("div");
    body.className = "point-body";
    body.innerHTML = `
      <p class="point-text">${point.body}</p>
      <div class="point-source">${sourceHTML}</div>
    `;

    item.appendChild(pBtn);
    item.appendChild(body);
    list.appendChild(item);
  });

  card.appendChild(list);
  main.appendChild(card);
});

    Nisbett, Richard — <em>Intelligence and How to Get It</em> (W.W. Norton, 2009) &middot;
    Carmichael &amp; Hamilton — <em>Black Power</em> (1967) &middot;
    Young, James O. — <em>Cultural Appropriation and the Arts</em> (Wiley-Blackwell, 2008) &middot;
    Yu et al. — <em>Genetics</em> 161(1) (2002, University of Chicago) · PMC1462113 &middot;
    Lewontin — <em>The Apportionment of Human Diversity</em> (1972)
  </p>
`;

// Append contact section then footer
main.appendChild(contactSection);
main.appendChild(footer);

document.getElementById("contactForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const form = e.target;
  const btn = document.getElementById("contactSubmit");
  const status = document.getElementById("contactStatus");

  btn.disabled = true;
  btn.textContent = "Sending…";
  status.className = "contact-status";

  try {
    const res = await fetch("/", {
      method: "POST",
      headers: { "Content-Type": "application/x-www-form-urlencoded" },
      body: new URLSearchParams(new FormData(form)).toString(),
    });
    if (!res.ok) throw new Error(res.status);
    status.className = "contact-status success";
    status.textContent = "Message sent — thank you. I will be in touch.";
    form.reset();
  } catch {
    status.className = "contact-status error";
    status.textContent = "Failed to send. Please check your connection and try again.";
  } finally {
    btn.disabled = false;
    btn.textContent = "Send Message";
  }
});
</script>
